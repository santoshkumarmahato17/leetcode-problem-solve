name: Update Profile LeetCode Stats

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-profile:
    runs-on: ubuntu-latest

    steps:
      # Checkout LeetCode repository
      - name: Checkout Source Repository
        uses: actions/checkout@v4

      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Install dependencies
      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      # Generate statistics
      - name: Generate Stats
        run: |
          python generate_stats.py

      # Checkout profile repository
      - name: Checkout Profile Repository
        uses: actions/checkout@v4
        with:
          repository: santoshkumarmahato17/santoshkumarmahato17
          token: ${{ secrets.PROFILE_REPO_TOKEN }}
          path: profile

      # Copy generated files
      - name: Copy Files
        run: |
          cp stats.json profile/
          cp leetcode_stats_light.svg profile/
          cp leetcode_stats_dark.svg profile/
          python generate_readme.py profile

      # Commit and Push
      - name: Push to Profile Repository 
        working-directory: profile
        env:
          TOKEN: ${{ secrets.PROFILE_REPO_TOKEN }}
        run: 
          git config user.name "github-action[bot]"
          git config email.name "41898282+github-actions[bot]@users.noreply.github.com"

          git add 

          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi

          git commit -m "Auto update profile"

          git remote set-url origin https://x-access-token:${TOKEN}@github.com/santoshkumarmahato17/santoshkumarmahato17.git

          git push origin HEAD:main
   
