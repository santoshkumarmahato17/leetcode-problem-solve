name: Update Profile LeetCode Stats

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-profile:
    runs-on: ubuntu-latest

    steps:
      # Checkout LeetCode repository
      - name: Checkout Source Repository
        uses: actions/checkout@v4

      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Install dependencies
      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      # Generate statistics
      - name: Generate Stats
        run: |
          python generate_stats.py

      # Checkout profile repository (authenticates with PROFILE_REPO_TOKEN and persists credentials)
      - name: Checkout Profile Repository
        uses: actions/checkout@v4
        with:
          repository: santoshkumarmahato17/santoshkumarmahato17
          token: ${{ secrets.PROFILE_REPO_TOKEN }}
          path: profile

      # Copy generated files to profile repo directory and generate README
      - name: Copy Files
        run: |
          cp stats.json profile/
          cp leetcode_stats_light.svg profile/
          cp leetcode_stats_dark.svg profile/
          python generate_readme.py profile

      # Commit and Push to Profile Repository
      - name: Push to Profile Repository 
        working-directory: profile
        env:
          TOKEN: ${{ secrets.PROFILE_REPO_TOKEN }}
        run: |
          # 1. Verify token exists
          if [ -z "${TOKEN}" ]; then
            echo "::error::PROFILE_REPO_TOKEN secret is empty or not set."
            echo "Please set up a GitHub Personal Access Token (PAT) with write access to 'santoshkumarmahato17/santoshkumarmahato17' as a repository secret."
            exit 1
          fi

          # 2. Setup Git user configuration
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 3. Stage stats and readme files
          git add stats.json leetcode_stats_light.svg leetcode_stats_dark.svg README.md

          # 4. Check if there are differences to commit
          if git diff --cached --quiet; then
            echo "No changes in LeetCode profile stats."
            exit 0
          fi

          # 5. Commit changes with skip-ci indicator to prevent loops
          git commit -m "Auto update LeetCode profile stats [skip ci]"

          # 6. Get active branch name dynamically
          BRANCH_NAME=$(git branch --show-current)
          if [ -z "$BRANCH_NAME" ]; then
            BRANCH_NAME="main"
          fi
          echo "Target profile branch: $BRANCH_NAME"

          # 7. Pull any upstream changes to resolve non-fast-forward situations.
          # -X theirs resolves conflicts in favor of our generated files during rebase.
          git pull origin "$BRANCH_NAME" --rebase --autostash -X theirs

          # 8. Push back to the profile repository
          git push origin HEAD:"$BRANCH_NAME"
