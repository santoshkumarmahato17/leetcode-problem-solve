name: Update Profile LeetCode Stats

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the source repository (leetcode-problem-solve)
      - name: Checkout Source Repo
        uses: actions/checkout@v3

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Step 3: Generate Stats & Charts
      - name: Generate LeetCode Stats & Charts
        run: |
          python generate_stats.py

      # Step 4: Commit and Push stats.json & SVG charts to Source Repo
      - name: Commit changes to Source Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stats.json leetcode_stats_light.svg leetcode_stats_dark.svg
          # Commit only if there are changes. Use [skip ci] to prevent recursion.
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "Update stats.json and charts [skip ci]"
            git push
          else
            echo "No changes in stats or charts."
          fi

      # Step 5: Checkout Target Profile Repository (santoshkumarmahato17)
      - name: Checkout Target Profile Repo
        uses: actions/checkout@v3
        with:
          repository: santoshkumarmahato17/santoshkumarmahato17
          token: ${{ secrets.PAT_TOKEN }}
          path: target-repo

      # Step 6: Copy stats & SVG charts to Target Repo, and run README generator
      - name: Update Target Profile README
        run: |
          cp stats.json target-repo/
          cp leetcode_stats_light.svg target-repo/
          cp leetcode_stats_dark.svg target-repo/
          python generate_readme.py target-repo

      # Step 7: Commit and Push to Target Profile Repository
      - name: Commit and Push to Target Repo
        run: |
          cd target-repo
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md stats.json leetcode_stats_light.svg leetcode_stats_dark.svg
          # Remove any old residual files if present
          if [ -f leetcode_stats.png ]; then
            git rm -f leetcode_stats.png
          fi
          if [ -f leetcode_stats.svg ]; then
            git rm -f leetcode_stats.svg
          fi
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "Auto-update LeetCode statistics"
            git push
          else
            echo "No changes to the profile README."
          fi
