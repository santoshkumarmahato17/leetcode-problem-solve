name: Update Profile LeetCode Stats

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      # Checkout source repository
      - name: Checkout Source Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      # Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Install dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      # Generate statistics
      - name: Generate LeetCode Stats & Charts
        run: |
          python generate_stats.py

      # Commit generated files to source repository
      # Commit profile repository
- name: Commit Profile Repository
  run: |
    cd profile

    git config user.name "github-actions[bot]"
    git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

    git add .

    if git diff --cached --quiet; then
      echo "No profile changes."
    else
      git commit -m "Auto update LeetCode profile"

      git remote set-url origin https://x-access-token:${{ secrets.PROFILE_REPO_TOKEN }}@github.com/santoshkumarmahato17/santoshkumarmahato17.git

      git push origin HEAD:main
    fi

      # Checkout profile repository
      - name: Checkout Target Profile Repo
        uses: actions/checkout@v4
        with:
          repository: santoshkumarmahato17/santoshkumarmahato17
          token: ${{ secrets.PROFILE_REPO_TOKEN }}
          path: profile

      # Update profile repository
      - name: Copy Files
        run: |
          cp stats.json profile/
          cp leetcode_stats_light.svg profile/
          cp leetcode_stats_dark.svg profile/
          python generate_readme.py profile

      # Commit profile repository
      - name: Commit Profile Repository
        run: |
          cd profile

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md
          git add stats.json
          git add leetcode_stats_light.svg
          git add leetcode_stats_dark.svg

          if git diff --cached --quiet; then
            echo "No profile changes."
          else
            git commit -m "Auto update LeetCode profile"
            git push origin HEAD
          fi
